<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MiniLang Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #0b1020;
      --bg1: #0f1731;
      --card: rgba(255, 255, 255, 0.06);
      --card2: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.70);
      --brand: #7c3aed; /* violet */
      --brand2: #22c55e; /* green */
      --warn: #f59e0b;
      --danger: #ef4444;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --ui: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      font-family: var(--ui);
      background:
        radial-gradient(900px 500px at 8% 8%, rgba(124, 58, 237, 0.35), transparent 60%),
        radial-gradient(900px 500px at 90% 18%, rgba(34, 197, 94, 0.18), transparent 55%),
        radial-gradient(900px 700px at 30% 95%, rgba(59, 130, 246, 0.18), transparent 60%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
      min-height: 100vh;
      color: var(--text);
    }

    .app-shell {
      max-width: 1200px;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      background: rgba(10, 14, 30, 0.55);
      backdrop-filter: blur(10px);
    }

    .brand-badge {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.95), rgba(34, 197, 94, 0.75));
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .brand-title {
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.1;
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      font-weight: 650;
      margin: 0;
      letter-spacing: -0.01em;
      font-size: 0.98rem;
      color: rgba(255,255,255,0.90);
    }

    .kbd {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.82);
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.22);
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .codebox {
      width: 100%;
      border: 0;
      outline: none;
      padding: 16px;
      font-family: var(--mono);
      font-size: 0.98rem;
      line-height: 1.55;
      background: rgba(0, 0, 0, 0.24);
      color: rgba(255, 255, 255, 0.92);
      min-height: 420px;
      resize: vertical;
    }

    .toolbar {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.16);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .btn-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.92rem;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    .btn-pill:hover { transform: translateY(-1px); background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.18); }
    .btn-pill:active { transform: translateY(0px); }
    .btn-primary-pill { background: rgba(124, 58, 237, 0.22); border-color: rgba(124, 58, 237, 0.45); }
    .btn-primary-pill:hover { background: rgba(124, 58, 237, 0.30); border-color: rgba(124, 58, 237, 0.55); }
    .btn-green-pill { background: rgba(34, 197, 94, 0.18); border-color: rgba(34, 197, 94, 0.45); }
    .btn-green-pill:hover { background: rgba(34, 197, 94, 0.26); border-color: rgba(34, 197, 94, 0.58); }

    .stage-tabs .btn {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.88);
      padding: 8px 10px;
      font-weight: 650;
      font-size: 0.88rem;
      white-space: nowrap;
    }
    .stage-tabs .btn.active {
      background: rgba(124, 58, 237, 0.25);
      border-color: rgba(124, 58, 237, 0.55);
      color: rgba(255,255,255,0.95);
    }

    pre {
      margin: 0;
      padding: 14px 16px;
      background: rgba(0,0,0,0.22);
      color: rgba(255,255,255,0.90);
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 260px;
    }

    .muted { color: var(--muted); }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.30);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }
    .status-dot.ok { background: rgba(34,197,94,0.95); box-shadow: 0 0 0 4px rgba(34,197,94,0.12); }
    .status-dot.busy { background: rgba(245,158,11,0.95); box-shadow: 0 0 0 4px rgba(245,158,11,0.12); }
    .status-dot.err { background: rgba(239,68,68,0.95); box-shadow: 0 0 0 4px rgba(239,68,68,0.12); }

    @media (max-width: 991px) {
      .codebox { min-height: 340px; }
      pre { min-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="topbar py-3">
    <div class="container app-shell">
      <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
        <div class="d-flex align-items-center gap-3">
          <div class="brand-badge" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
              <path d="M5 0a.5.5 0 0 1 .5.5V2h1V.5a.5.5 0 0 1 1 0V2h1V.5a.5.5 0 0 1 1 0V2h.5A2.5 2.5 0 0 1 14 4.5V5h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v1h1.5a.5.5 0 0 1 0 1H14v.5A2.5 2.5 0 0 1 11.5 14H11v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-1v1.5a.5.5 0 0 1-1 0V14h-.5A2.5 2.5 0 0 1 2 11.5V11H.5a.5.5 0 0 1 0-1H2v-1H.5a.5.5 0 0 1 0-1H2V7H.5a.5.5 0 0 1 0-1H2v-.5A2.5 2.5 0 0 1 4.5 2H5V.5A.5.5 0 0 1 5 0Z"/>
              <path d="M3 4.5V5h10v-.5A1.5 1.5 0 0 0 11.5 3h-7A1.5 1.5 0 0 0 3 4.5ZM13 6H3v4h10V6Zm0 5H3v.5A1.5 1.5 0 0 0 4.5 13h7A1.5 1.5 0 0 0 13 11.5V11Z"/>
            </svg>
          </div>
          <div>
            <p class="brand-title">MiniLang Studio</p>
            <p class="brand-subtitle">Editor + compiler pipeline preview</p>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <div class="d-flex align-items-center gap-2">
            <div id="statusDot" class="status-dot ok" title="Ready"></div>
            <span id="statusText" class="muted">Ready</span>
          </div>
          <a class="btn btn-pill" href="/rules">Language Rules</a>
        </div>
      </div>
    </div>
  </div>

  <div class="container app-shell py-4 py-lg-5">
    <div class="row g-3 g-lg-4">
      <div class="col-lg-6">
        <div class="panel h-100">
          <div class="panel-header">
            <div class="d-flex flex-column">
              <p class="panel-title">Source</p>
              <div class="muted" style="font-size:0.86rem">Tip: <span class="kbd">Ctrl</span> <span class="kbd">Enter</span> runs the selected stage</div>
            </div>
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button class="btn btn-pill btn-primary-pill" id="btnSample" type="button">Load sample</button>
              <button class="btn btn-pill" id="btnClear" type="button">Clear</button>
              <button class="btn btn-pill" id="btnCopyCode" type="button">Copy</button>
            </div>
          </div>
          <textarea id="code" class="codebox" placeholder="Write MiniLang code here...&#10;&#10;Example:&#10;var x = 10;&#10;print x;"></textarea>
          <div class="toolbar">
            <div class="stage-tabs btn-group" role="group" aria-label="Stages">
              <button class="btn active" type="button" data-stage="tokenize">Tokenize</button>
              <button class="btn" type="button" data-stage="parse">Parse</button>
              <button class="btn" type="button" data-stage="semantic">Semantic</button>
              <button class="btn" type="button" data-stage="intermediate">IR</button>
              <button class="btn" type="button" data-stage="assembly">Assembly</button>
            </div>
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button class="btn btn-pill btn-green-pill" id="btnRun" type="button">Run stage</button>
              <button class="btn btn-pill" id="btnOptimize" type="button">Optimize</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="panel mb-3 mb-lg-4">
          <div class="panel-header">
            <div class="d-flex flex-column">
              <p class="panel-title" id="outTitle">Output</p>
              <div class="muted" style="font-size:0.86rem">Stage output appears here</div>
            </div>
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button class="btn btn-pill" id="btnCopyOut" type="button">Copy output</button>
            </div>
          </div>
          <pre id="output">{{ output if output else '' }}</pre>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="d-flex flex-column">
              <p class="panel-title">Optimization</p>
              <div class="muted" style="font-size:0.86rem">Shows optimized code + technique</div>
            </div>
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button class="btn btn-pill" id="btnCopyOpt" type="button">Copy optimized</button>
            </div>
          </div>
          <pre id="optimized_output"></pre>
          <div style="border-top:1px solid var(--border)"></div>
          <pre id="technique_output" class="muted"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const SAMPLE = `var x = 10+20;
var y = 20;
var z = x + y;

print z;

if (x < y) {
    print x;
} else {
    print y;
}

return z;`;

    const els = {
      code: document.getElementById("code"),
      output: document.getElementById("output"),
      optimized: document.getElementById("optimized_output"),
      technique: document.getElementById("technique_output"),
      outTitle: document.getElementById("outTitle"),
      statusDot: document.getElementById("statusDot"),
      statusText: document.getElementById("statusText"),
      btnRun: document.getElementById("btnRun"),
      btnOptimize: document.getElementById("btnOptimize"),
      btnSample: document.getElementById("btnSample"),
      btnClear: document.getElementById("btnClear"),
      btnCopyCode: document.getElementById("btnCopyCode"),
      btnCopyOut: document.getElementById("btnCopyOut"),
      btnCopyOpt: document.getElementById("btnCopyOpt"),
      stageButtons: Array.from(document.querySelectorAll("[data-stage]")),
    };

    let activeStage = "tokenize";
    let isBusy = false;

    function setStatus(kind, text) {
      els.statusDot.classList.remove("ok", "busy", "err");
      els.statusDot.classList.add(kind);
      els.statusText.innerText = text;
    }

    function setActiveStage(stage) {
      activeStage = stage;
      els.stageButtons.forEach((b) => b.classList.toggle("active", b.dataset.stage === stage));
      const title = ({
        tokenize: "Output — Tokenization",
        parse: "Output — Parsing",
        semantic: "Output — Semantic analysis",
        intermediate: "Output — Intermediate Representation",
        assembly: "Output — Assembly generation",
      })[stage] || "Output";
      els.outTitle.innerText = title;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        return false;
      }
    }

    async function compile(action) {
      const code = els.code.value;
      if (!code.trim()) {
        els.output.innerText = "Please enter some code first.";
        setStatus("err", "No code");
        return;
      }

      if (isBusy) return;
      isBusy = true;
      setStatus("busy", "Running...");
      els.output.innerText = "Processing...";

      try {
        const response = await fetch("/compile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, action }),
        });
        const data = await response.json();

        els.output.innerText = data.output || "";

        if (action === "optimize") {
          els.optimized.innerText = data.optimized_code || "";
          els.technique.innerText = data.technique || "";
        } else {
          els.optimized.innerText = "";
          els.technique.innerText = "";
        }

        const looksLikeError = (data.output || "").toLowerCase().includes("error");
        setStatus(looksLikeError ? "err" : "ok", looksLikeError ? "Finished with errors" : "Done");
      } catch (err) {
        els.output.innerText = "Error: " + err;
        setStatus("err", "Request failed");
      } finally {
        isBusy = false;
      }
    }

    els.stageButtons.forEach((b) => b.addEventListener("click", () => setActiveStage(b.dataset.stage)));
    els.btnRun.addEventListener("click", () => compile(activeStage));
    els.btnOptimize.addEventListener("click", () => compile("optimize"));
    els.btnSample.addEventListener("click", () => { els.code.value = SAMPLE; setStatus("ok", "Loaded sample"); });
    els.btnClear.addEventListener("click", () => { els.code.value = ""; els.output.innerText = ""; els.optimized.innerText = ""; els.technique.innerText = ""; setStatus("ok", "Cleared"); });
    els.btnCopyCode.addEventListener("click", async () => { const ok = await copyText(els.code.value); setStatus(ok ? "ok" : "err", ok ? "Copied source" : "Copy failed"); });
    els.btnCopyOut.addEventListener("click", async () => { const ok = await copyText(els.output.innerText); setStatus(ok ? "ok" : "err", ok ? "Copied output" : "Copy failed"); });
    els.btnCopyOpt.addEventListener("click", async () => { const ok = await copyText(els.optimized.innerText); setStatus(ok ? "ok" : "err", ok ? "Copied optimized" : "Copy failed"); });

    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        compile(activeStage);
      }
    });

    setActiveStage(activeStage);
  </script>
</body>
</html>
